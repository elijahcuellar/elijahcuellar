name: Update Badges

on:
  schedule:
    # Runs weekly on Monday at 2 AM UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  update-badges:
    name: Update README with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine whether to back off this week
        id: inactivity
        uses: actions/github-script@v7
        with:
          script: |
            const twoWeeksInMs = 14 * 24 * 60 * 60 * 1000;
            const threeWeeksInMs = 21 * 24 * 60 * 60 * 1000;

            const commits = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'README.md',
              per_page: 1,
            });

            const latestCommit = Array.isArray(commits.data)
              ? commits.data[0]
              : null;
            if (!latestCommit) {
              core.setOutput('skip_update', 'false');
              core.info('No README commit history found. Running update.');
              return;
            }

            const latestCommitDate = new Date(
              latestCommit.commit.committer.date
            ).getTime();
            const inactivityMs = Date.now() - latestCommitDate;
            const shouldSkipThisWeek =
              inactivityMs >= twoWeeksInMs && inactivityMs < threeWeeksInMs;

            const skipUpdateOutput = shouldSkipThisWeek ? 'true' : 'false';
            core.setOutput('skip_update', skipUpdateOutput);
            core.info(
              shouldSkipThisWeek
                ? 'No README changes in the last 2 weeks. ' +
                  'Backing off for 1 week.'
                : 'Backoff window not active. Running update.'
            );

      - name: Update Badges
        if: steps.inactivity.outputs.skip_update != 'true'
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: elijah-cuellar
          NUMBER_LAST_BADGES: 10
